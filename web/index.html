    function logsView(logs) {
      if (!logs.length) return '<div class="empty">Nenhum log técnico registrado.</div>';
      const counts = logs.reduce((acc, item) => {
        acc[item.level] = (acc[item.level] || 0) + 1;
        return acc;
      }, {});
      return `
        <div class="list">
          <article class="card">
            <div class="card-head">
              <h3>Logs técnicos</h3>
              <span class="pill">${escapeHtml(logs.length)} recentes</span>
            </div>
            <div class="inline-actions">
              ${Object.entries(counts).map(([level, count]) => `<span class="pill ${level === 'ERROR' ? 'block' : level === 'WARN' ? 'warn' : 'run'}">${escapeHtml(level)} ${escapeHtml(count)}</span>`).join('')}
            </div>
          </article>
          ${logs.map(l => `
            <article class="card log-row ${escapeHtml(l.level)}">
              <span class="pill ${l.level === 'ERROR' ? 'block' : l.level === 'WARN' ? 'warn' : 'run'}">${escapeHtml(l.level)}</span>
              <span class="pill">${escapeHtml(l.scope)}</span>
              <div>${escapeHtml(l.message)}</div>
              <div class="meta">${escapeHtml(l.created_at)}</div>
            </article>`).join('')}
        </div>`;
    }

    function logsViewV2(logs) {
      if (!logs.length) return '<div class="empty">Nenhum log tecnico registrado.</div>';
      const counts = logs.reduce((acc, item) => {
        acc[item.level] = (acc[item.level] || 0) + 1;
        return acc;
      }, {});
      const scopes = [...new Set(logs.map(item => item.scope).filter(Boolean))].sort();
      const visible = logs.filter(item => (logLevelFilter === 'all' || item.level === logLevelFilter) && (logScopeFilter === 'all' || item.scope === logScopeFilter) && matchesAuditSearch([item.level, item.scope, item.message, item.created_at]));
      return `
        <div class="list">
          <article class="card">
            <div class="card-head">
              <h3>Logs tecnicos</h3>
              <span class="pill">${escapeHtml(visible.length)}/${escapeHtml(logs.length)} recentes</span>
            </div>
            <div class="inline-actions">
              ${Object.entries(counts).map(([level, count]) => `<span class="pill ${level === 'ERROR' ? 'block' : level === 'WARN' ? 'warn' : 'run'}">${escapeHtml(level)} ${escapeHtml(count)}</span>`).join('')}
            </div>
            <div class="audit-toolbar" style="margin-top:10px">
              <label>Nivel
                <select data-audit-control="log-level">
                  ${['all','ERROR','WARN','INFO'].map(value => `<option value="${value}" ${logLevelFilter === value ? 'selected' : ''}>${value}</option>`).join('')}
                </select>
              </label>
              <label>Origem
                <select data-audit-control="log-scope">
                  <option value="all" ${logScopeFilter === 'all' ? 'selected' : ''}>all</option>
                  ${scopes.map(value => `<option value="${escapeHtml(value)}" ${logScopeFilter === value ? 'selected' : ''}>${escapeHtml(value)}</option>`).join('')}
                </select>
              </label>
              <label>Busca
                <input data-audit-control="search" value="${escapeHtml(auditSearch)}" placeholder="mensagem, origem, nivel">
              </label>
            </div>
          </article>
          ${visible.length ? visible.map(l => `
            <article class="card log-row ${escapeHtml(l.level)}">
              <span class="pill ${l.level === 'ERROR' ? 'block' : l.level === 'WARN' ? 'warn' : 'run'}">${escapeHtml(l.level)}</span>
              <span class="pill">${escapeHtml(l.scope)}</span>
              <div>${escapeHtml(l.message)}</div>
              <div class="meta">${escapeHtml(l.created_at)}</div>
            </article>`).join('') : '<div class="empty">Nenhum log neste filtro.</div>'}
        </div>`;
    }

    function engineView(engine) {
      if (!engine) return '<div class="meta">Symbolic Engine ainda nao inicializado.</div>';
      const packs = engine.packs || [];
      return `
        <article class="card">
          <h3>${escapeHtml(engine.name || 'Symbolic Engine')}</h3>
          <span class="pill done">${escapeHtml(engine.mode || 'symbolic')}</span>
          <span class="pill">v${escapeHtml(engine.version || '2.0')}</span>
          <div class="meta">${escapeHtml(engine.description || '')}</div>
          <div class="metrics" style="margin-top:10px">
            <div class="metric"><strong>${escapeHtml(engine.pack_count || 0)}</strong><span>Knowledge Packs</span></div>
            <div class="metric"><strong>${escapeHtml(engine.rule_count || 0)}</strong><span>Regras</span></div>
          </div>
          ${packs.length ? packs.map(p => `
            <div class="jit-box">
              <div class="card-head">
                <h3>${escapeHtml(p.domain)}</h3>
                <span class="pill">${escapeHtml(p.rule_count)} regra(s)</span>
              </div>
              <div class="meta">versao ${escapeHtml(p.version || '-')} | carregado ${escapeHtml(p.loaded_at || '')}</div>
            </div>`).join('') : '<div class="empty">Nenhum Knowledge Pack carregado.</div>'}
        </article>`;
    }

    function canRetry(task) {
      return !task.read_only && ['Reprovado', 'Bloqueado', 'Cancelado', 'Refazendo'].includes(task.status);
    }

    function validationSummary(task) {
      const validations = (task.payload && task.payload.validations) || [];
      if (!validations.length) return '';
      return `<div class="list" style="margin:8px 0">${validations.map(v => `
        <div>
          <span class="pill ${v.passed ? 'done' : 'block'}">${escapeHtml(v.name)}</span>
          <span class="meta">${escapeHtml(v.duration || '')}</span>
          <pre>${escapeHtml(v.output || '')}</pre>
        </div>`).join('')}</div>`;
    }

    function questionForm(session) {
      const questions = session.questions || [];
      const draft = interrogationDrafts[session.id];
      return `
        <div class="question-list">
          ${questions.map((q, i) => `
            <label><span><span class="question-index">${i + 1}</span>${escapeHtml(q)}</span>
              <input data-answer="${session.id}:q${i + 1}" value="${escapeHtml((session.answers || {})['q' + (i + 1)] || '')}">
            </label>`).join('')}
          <div class="meta">Responda o suficiente para formar um contrato auditável. Depois gere a revisão, ajuste o texto final e sele.</div>
          <div class="inline-actions">
            <button class="ghost" data-preview="${session.id}">Pré-visualizar contrato</button>
          </div>
          ${draft ? contractDraftForm(session.id, draft) : ''}
        </div>`;
    }

    function contractDraftForm(id, draft) {
      return `
        <div class="contract-draft">
          <div class="card-head">
            <h3>Contrato em revisão</h3>
            <span class="pill">hash ${escapeHtml(draft.hash || 'recalculado ao selar')}</span>
          </div>
          <label>Objetivo final
            <textarea data-draft="${id}:north_star">${escapeHtml(draft.north_star || '')}</textarea>
          </label>
          <label>Restrições
            <textarea data-draft="${id}:constraints">${escapeHtml(draft.constraints || '')}</textarea>
          </label>
          <label>Entregáveis
            <textarea data-draft="${id}:deliverables">${escapeHtml(draft.deliverables || '')}</textarea>
          </label>
          <div class="inline-actions">
            <button class="primary" data-finalize="${id}">Selar contrato revisado</button>
          </div>
        </div>`;
    }

    function questionFormV2(session) {
      const questions = session.questions || [];
      const draft = interrogationDrafts[session.id];
      const answered = Object.values(session.answers || {}).filter(Boolean).length;
      return `
        <div class="question-list">
          <div class="seal-warning">Revise as respostas com cuidado. O contrato final sera selado por hash e nao podera ser editado depois.</div>
          <div class="contract-summary">
            <span class="pill">${escapeHtml(answered)}/${escapeHtml(questions.length)} respostas salvas</span>
            <span class="pill ${draft ? 'done' : 'warn'}">${draft ? 'previa pronta' : 'gerar previa'}</span>
          </div>
          ${questions.map((q, i) => `
            <label><span><span class="question-index">${i + 1}</span>${escapeHtml(q)}</span>
              <input data-answer="${session.id}:q${i + 1}" value="${escapeHtml((session.answers || {})['q' + (i + 1)] || '')}">
            </label>`).join('')}
          <div class="meta">Responda o suficiente para formar um contrato auditavel. Depois gere a revisao, ajuste o texto final e sele.</div>
          <div class="inline-actions">
            <button class="ghost" data-preview="${session.id}">Pre-visualizar contrato</button>
          </div>
          ${draft ? contractDraftFormV2(session.id, draft) : ''}
        </div>`;
    }

    function contractDraftFormV2(id, draft) {
      return `
        <div class="contract-draft">
          <div class="card-head">
            <h3>Contrato em revisao</h3>
            <span class="pill">hash ${escapeHtml(draft.hash || 'recalculado ao selar')}</span>
          </div>
          <div class="contract-review-grid">
            <div class="audit-row">
              <strong>Objetivo</strong>
              <span class="meta">Define o norte imutavel do trabalho.</span>
            </div>
            <div class="audit-row">
              <strong>Restricoes</strong>
              <span class="meta">Limites tecnicos e operacionais.</span>
            </div>
            <div class="audit-row">
              <strong>Entregaveis</strong>
              <span class="meta">Saidas que o Quadro de Obras deve produzir.</span>
            </div>
          </div>
          <label>Objetivo final
            <textarea data-draft="${id}:north_star">${escapeHtml(draft.north_star || '')}</textarea>
          </label>
          <label>Restricoes
            <textarea data-draft="${id}:constraints">${escapeHtml(draft.constraints || '')}</textarea>
          </label>
          <label>Entregaveis
            <textarea data-draft="${id}:deliverables">${escapeHtml(draft.deliverables || '')}</textarea>
          </label>
          <div class="seal-warning">Ao selar, o contrato vira fonte de verdade no SQLite e o hash passa a identificar esta versao. Edicoes posteriores exigem novo contrato.</div>
          <div class="inline-actions">
            <button class="primary" data-finalize="${id}">Selar contrato revisado</button>
          </div>
        </div>`;
    }

    async function refresh() {
      const res = await fetch('/api/snapshot');
      snapshot = await res.json();
      render();
    }

    $('send').onclick = async () => {
      const input = $('input').value.trim();
      if (!input) return;
      await fetch('/api/interrogations', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ input }) });
      $('input').value = '';
      refresh();
    };
    $('legacy').onclick = async () => {
      const input = $('input').value.trim();
      if (!input) return;
      await fetch('/api/projects', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ input }) });
      $('input').value = '';
      refresh();
    };
    $('yamlSend').onclick = async () => {
      const yaml = $('yamlInput').value.trim();
      if (!yaml) return;
      await fetch('/api/projects/yaml', { method: 'POST', headers: {'Content-Type': 'text/plain'}, body: yaml });
      $('yamlInput').value = '';
      refresh();
    };
    $('factorySend').onclick = async () => {
      const template = $('input').value.trim();
      const items = $('factoryItems').value.split('\n').map(x => x.trim()).filter(Boolean);
      const force_new = $('factoryForceNew').checked;
      if (!template || !items.length) return;
      await fetch('/api/factory_series', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ template, items, force_new })
      });
      $('input').value = '';
      $('factoryItems').value = '';
      $('factoryForceNew').checked = false;
      refresh();
    };
    document.addEventListener('click', async (event) => {
      const previewButton = event.target.closest('[data-preview]');
      if (previewButton) {
        const id = Number(previewButton.dataset.preview);
        const answers = answersForInterrogation(id);
        const res = await fetch('/api/interrogations/preview', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id, answers }) });
        if (res.ok) {
          interrogationDrafts[id] = await res.json();
          render();
        }
        return;
      }
      const button = event.target.closest('[data-finalize]');
      if (!button) return;
      const id = Number(button.dataset.finalize);
      const answers = answersForInterrogation(id);
      const draft = draftForInterrogation(id);
      if (!confirm('Selar este contrato agora? Depois disso, ele sera imutavel e identificado pelo hash.')) return;
      await fetch('/api/interrogations/finalize', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id, answers, ...draft }) });
      delete interrogationDrafts[id];
      refresh();
    });

    function answersForInterrogation(id) {
      const answers = {};
      document.querySelectorAll(`[data-answer^="${id}:"]`).forEach(input => {
        answers[input.dataset.answer.split(':')[1]] = input.value.trim();
      });
      return answers;
    }

    function draftForInterrogation(id) {
      const draft = {};
      document.querySelectorAll(`[data-draft^="${id}:"]`).forEach(input => {
        draft[input.dataset.draft.split(':')[1]] = input.value.trim();
      });
      return draft;
    }
    document.addEventListener('input', (event) => {
      const control = event.target.closest('[data-audit-control="search"]');
      if (!control) return;
      auditSearch = control.value;
      render();
    });
    document.addEventListener('change', (event) => {
      const control = event.target.closest('[data-audit-control]');
      if (!control) return;
      switch (control.dataset.auditControl) {
        case 'artifact-contract':
          artifactContractFilter = control.value;
          break;
        case 'handoff-contract':
          handoffContractFilter = control.value;
          break;
        case 'factory-batch':
          factoryBatchFilter = control.value;
          break;
        case 'knowledge-status':
          knowledgeCandidateFilter = control.value;
          break;
        case 'log-level':
          logLevelFilter = control.value;
          break;
        case 'log-scope':
          logScopeFilter = control.value;
          break;
        default:
          return;
      }
      render();
    });
    document.addEventListener('click', async (event) => {
      const exportButton = event.target.closest('[data-factory-export]');
      if (exportButton) {
        const batch_id = exportButton.dataset.factoryExport;
        const res = await fetch(`/api/factory_batches/export?batch_id=${encodeURIComponent(batch_id)}`);
        const data = await res.json();
        if (!res.ok) {
          alert(data.error || 'Falha na exportacao do lote');
          return;
        }
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `factory-${batch_id}.json`;
        link.click();
        URL.revokeObjectURL(url);
        return;
      }
      const factoryButton = event.target.closest('[data-factory-action]');
      if (factoryButton) {
        const batch_id = factoryButton.dataset.batch;
        const action = factoryButton.dataset.factoryAction;
        const index = Number(factoryButton.dataset.index || 0);
        const reason = prompt(`Motivo para ${action}:`) || '';
        await fetch('/api/factory_batches/action', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ batch_id, action, index, reason })
        });
        refresh();
        return;
      }
      const actionButton = event.target.closest('[data-task-action]');
      if (actionButton) {
        const id = Number(actionButton.dataset.task);
        const action = actionButton.dataset.taskAction;
        const reason = prompt(action === 'cancel' ? 'Motivo tecnico da parada:' : 'Motivo da refacao:') || '';
        await fetch('/api/tasks/action', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id, action, reason }) });
        refresh();
        return;
      }
      const reauditButton = event.target.closest('[data-reaudit]');
      if (reauditButton) {
        const id = Number(reauditButton.dataset.reaudit);
        await fetch('/api/contracts/reaudit', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id }) });
        refresh();
        return;
      }
      const purgeButton = event.target.closest('#jitPurge');
      if (purgeButton) {
        const res = await fetch('/api/knowledge_packs/purge', { method: 'POST' });
        const data = await res.json();
        knowledgePackNotice = `${data.removed || 0} expirado(s)`;
        await refresh();
        return;
      }
      const candidateButton = event.target.closest('[data-candidate-action]');
      if (candidateButton) {
        const id = Number(candidateButton.dataset.candidate);
        const action = candidateButton.dataset.candidateAction;
        const res = await fetch('/api/knowledge_candidates', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ id, action })
        });
        knowledgePackNotice = res.ok ? (action === 'approve' ? 'regra aprovada' : 'regra rejeitada') : 'erro na regra candidata';
        await refresh();
      }
    });
    document.addEventListener('submit', async (event) => {
      if (event.target.id === 'jitForm') {
        event.preventDefault();
        const topic = $('jitTopic').value.trim();
        const source = $('jitSource').value.trim();
        const text = $('jitText').value.trim();
        if (!topic || !text) return;
        const res = await fetch('/api/knowledge_packs', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ topic, source, text })
        });
        if (res.ok) {
          knowledgePackNotice = 'salvo';
          knowledgePackResults = [];
          await refresh();
        } else {
          const data = await res.json();
          knowledgePackNotice = data.error || 'erro';
          render();
        }
        return;
      }
      if (event.target.id === 'jitSearchForm') {
        event.preventDefault();
        const query = $('jitSearch').value.trim();
        if (!query) return;
        const res = await fetch(`/api/knowledge_packs?q=${encodeURIComponent(query)}&limit=8`);
        knowledgePackResults = res.ok ? await res.json() : [];
        knowledgePackNotice = knowledgePackResults.length ? 'busca concluida' : 'sem resultado';
        render();
      }
    });
    $('panic').onclick = async () => {
      const reason = prompt('Motivo tecnico da interrupcao:') || 'interrupcao manual';
      await fetch('/api/panic', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ reason }) });
      refresh();
    };
    $('resume').onclick = async () => {
      await fetch('/api/resume', { method: 'POST' });
      refresh();
    };
    document.querySelectorAll('.tab').forEach(btn => btn.onclick = () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
      $('engine').classList.toggle('hidden', btn.dataset.tab !== 'engine');
      $('sealed').classList.toggle('hidden', btn.dataset.tab !== 'sealed');
      $('handoffs').classList.toggle('hidden', btn.dataset.tab !== 'handoffs');
      $('factory').classList.toggle('hidden', btn.dataset.tab !== 'factory');
      $('plugins').classList.toggle('hidden', btn.dataset.tab !== 'plugins');
      $('knowledge_packs').classList.toggle('hidden', btn.dataset.tab !== 'knowledge_packs');
      $('audit_metrics').classList.toggle('hidden', btn.dataset.tab !== 'audit_metrics');
      $('logs').classList.toggle('hidden', btn.dataset.tab !== 'logs');
    });
    document.querySelectorAll('.filter').forEach(btn => btn.onclick = () => {
      document.querySelectorAll('.filter').forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
      taskFilter = btn.dataset.filter;
      render();
    });
    document.querySelectorAll('.mode').forEach(btn => btn.onclick = () => {
      document.querySelectorAll('.mode').forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
      inputMode = btn.dataset.mode;
      $('input').classList.toggle('hidden', inputMode !== 'interrogate');
      if (inputMode === 'factory') $('input').classList.remove('hidden');
      $('send').classList.toggle('hidden', inputMode !== 'interrogate');
      $('legacy').classList.toggle('hidden', inputMode !== 'interrogate');
      $('yamlInput').classList.toggle('hidden', inputMode !== 'yaml');
      $('yamlSend').classList.toggle('hidden', inputMode !== 'yaml');
      $('factoryItems').classList.toggle('hidden', inputMode !== 'factory');
      $('factorySend').classList.toggle('hidden', inputMode !== 'factory');
      $('factoryForceWrap').classList.toggle('hidden', inputMode !== 'factory');
      $('factoryForceWrap').style.display = inputMode === 'factory' ? 'block' : 'none';
    });

    function connect() {
      const ws = new WebSocket(`ws://${location.host}/ws`);
      ws.onopen = () => { $('conn').className = 'dot ok'; };
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.kind === 'snapshot') snapshot = msg.payload;
        if (msg.kind === 'watchdog') latestWatchdog = msg.payload;
        render();
      };
      ws.onclose = () => {
        $('conn').className = 'dot';
        $('state').textContent = 'Reconectando';
        setTimeout(connect, 1500);
      };
    }
    refresh();
    connect();
  </script>
</body>
</html>
